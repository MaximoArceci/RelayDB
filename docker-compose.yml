name: relaydb

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3001:3000"
    environment:
      VITE_API_BASE_URL: ""
      VITE_PLATFORM_NAME: RelayDB
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      API_ENV: local
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000
      STATE_PATH: /relaydb-state/environments.json
    volumes:
      - ./backend:/app
      - relaydb_state:/relaydb-state
      - /var/run/docker.sock:/var/run/docker.sock

  relaydb-router:
    build:
      context: .
      dockerfile: docker/router.Dockerfile
    ports:
      - "${RELAYDB_ROUTER_PUBLIC_PORT:-5432}:5432"
    environment:
      RELAYDB_STATE_PATH: /relaydb-state/environments.json
      RELAYDB_ROUTER_PORT: 5432
    volumes:
      - relaydb_state:/relaydb-state
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  relaydb_state:

networks:
  default:
    name: relaydb-network
