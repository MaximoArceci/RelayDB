services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3001:3000"
    environment:
      VITE_API_BASE_URL: ""
      VITE_PLATFORM_NAME: Switchbase
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      API_ENV: local
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000
      STATE_PATH: /switchbase-state/environments.json
    volumes:
      - ./backend:/app
      - switchbase_state:/switchbase-state

  switchbase-router:
    build:
      context: .
      dockerfile: docker/router.Dockerfile
    ports:
      - "${SWITCHBASE_ROUTER_PUBLIC_PORT:-5432}:5432"
    environment:
      SWITCHBASE_STATE_PATH: /switchbase-state/environments.json
      SWITCHBASE_ROUTER_PORT: 5432
    volumes:
      - switchbase_state:/switchbase-state
    depends_on:
      - backend
      - postgres-dev
      - postgres-qa

  postgres-dev:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  postgres-qa:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data

volumes:
  frontend_node_modules:
  switchbase_state:
  postgres_dev_data:
  postgres_qa_data:
