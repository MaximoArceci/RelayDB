<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">RelayDB snapshot workflow</title>
  <desc id="desc">RelayDB freezes a PostgreSQL environment with pg_dump and restores the dump into any target environment using pg_restore.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b12"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
  </defs>
  <rect width="1400" height="620" fill="url(#bg)"/>
  <text x="64" y="72" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">Snapshots are reproducible development states</text>
  <text x="64" y="108" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Freeze any managed database and restore that state into any other managed database.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="280" height="150" rx="16" fill="#111827" stroke="#1e293b"/>
    <text x="100" y="236" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="14" letter-spacing="3">SOURCE ENV</text>
    <text x="100" y="276" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">feature-auth-db</text>
    <text x="100" y="308" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">PostgreSQL container + volume</text>

    <rect x="480" y="190" width="280" height="150" rx="16" fill="#0c4a6e" stroke="#0891b2"/>
    <text x="510" y="236" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="14" letter-spacing="3">FREEZE</text>
    <text x="510" y="276" fill="#f8fafc" font-family="JetBrains Mono, Consolas, monospace" font-size="20">pg_dump -Fc</text>
    <text x="510" y="308" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="16">custom-format dump</text>

    <rect x="890" y="160" width="360" height="210" rx="16" fill="#111827" stroke="#164e63"/>
    <text x="920" y="206" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="14" letter-spacing="3">SHARED SNAPSHOT VOLUME</text>
    <text x="920" y="246" fill="#f8fafc" font-family="JetBrains Mono, Consolas, monospace" font-size="19">/snapshots/*.dump</text>
    <text x="920" y="282" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Stored outside database volumes</text>
    <text x="920" y="314" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Survives environment deletion</text>
  </g>

  <line x1="350" y1="265" x2="472" y2="265" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="760" y1="265" x2="882" y2="265" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="250" y="440" width="360" height="118" rx="16" fill="#111827" stroke="#1e293b"/>
    <text x="280" y="486" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="14" letter-spacing="3">ANY TARGET ENV</text>
    <text x="280" y="524" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">qa-debug-db or teammate-db</text>

    <rect x="760" y="440" width="360" height="118" rx="16" fill="#0c4a6e" stroke="#0891b2"/>
    <text x="790" y="486" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="14" letter-spacing="3">RESTORE</text>
    <text x="790" y="524" fill="#f8fafc" font-family="JetBrains Mono, Consolas, monospace" font-size="20">dropdb + createdb + pg_restore</text>
  </g>

  <path d="M1070 370 C1070 430 1030 430 1120 498" fill="none" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="760" y1="499" x2="618" y2="499" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
